<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Room Tracker Pro v8.1</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, sans-serif; background: #f3f4f6; padding-bottom: 80px; }
        .header { background: linear-gradient(135deg, #2563eb 0%, #1e40af 100%); color: white; padding: 16px; position: relative; }
        .version-tag { position: absolute; top: 10px; right: 15px; font-size: 12px; font-weight: bold; background: rgba(255, 255, 255, 0.2); padding: 4px 8px; border-radius: 4px; }
        .week-nav { display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.2); padding: 10px; border-radius: 8px; margin-top: 12px; }
        .week-nav button, .btn-tool { background: white; color: #2563eb; border: none; padding: 5px 12px; border-radius: 4px; font-weight: bold; cursor: pointer; }
        .tabs { display: flex; background: white; border-bottom: 2px solid #e5e7eb; position: sticky; top: 0; z-index: 50; }
        .tab-button { flex: 1; padding: 16px; border: none; background: none; cursor: pointer; font-weight: 600; color: #6b7280; }
        .tab-button.active { color: #2563eb; border-bottom: 3px solid #2563eb; background: #f0f7ff; }
        .tab-content { display: none; padding: 16px; }
        .tab-content.active { display: block; }
        .table-container { overflow-x: auto; background: white; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #e5e7eb; padding: 10px; text-align: center; position: relative; cursor: pointer; vertical-align: top; }
        th { background: #1e40af; color: white; font-size: 11px; }
        .status-cell { border-radius: 4px; padding: 3px; font-size: 9px; font-weight: bold; color: white; margin-bottom: 2px; }
        .status-check-in { background: #10b981; }
        .status-check-out { background: #f59e0b; }
        .status-occupied { background: #3b82f6; }
        .late-alert { border: 2px solid #ef4444; box-shadow: 0 0 5px red; }
        .tooltip { visibility: hidden; width: 220px; background-color: #333; color: #fff; text-align: left; border-radius: 6px; padding: 10px; position: absolute; z-index: 100; bottom: 125%; left: 50%; margin-left: -110px; opacity: 0; transition: opacity 0.3s; font-size: 11px; }
        td:hover .tooltip { visibility: visible; opacity: 1; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); align-items: center; justify-content: center; z-index: 1000; }
        .modal.active { display: flex; }
        .modal-content { background: white; padding: 20px; border-radius: 12px; width: 95%; max-width: 450px; }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; font-size: 12px; font-weight: bold; margin-bottom: 4px; }
        .form-group input, .form-group textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; }
    </style>
</head>
<body>

<div class="header">
    <div class="version-tag">Version 8.1</div>
    <h1>🏨 Hotel Tracker Pro</h1>
    <div class="week-nav">
        <button onclick="changeWeek(-7)">◀</button>
        <span id="weekLabel" style="font-weight: bold;"></span>
        <button onclick="changeWeek(7)">▶</button>
    </div>
    <div style="margin-top:10px;">
        <button class="btn-tool" onclick="exportData()">📥 Backup</button>
        <button class="btn-tool" onclick="document.getElementById('importInput').click()">📤 Restore</button>
        <input type="file" id="importInput" style="display:none" onchange="importData(event)">
    </div>
</div>

<div class="tabs">
    <button id="btn-tracker" class="tab-button active" onclick="switchTab('tracker')">Tracker</button>
    <button id="btn-vacancy" class="tab-button" onclick="switchTab('vacancy')">Vacancy</button>
    <button id="btn-settings" class="tab-button" onclick="switchTab('settings')">Settings</button>
</div>

<div id="trackerTab" class="tab-content active">
    <div class="table-container"><table><thead><tr id="tableHeader"></tr></thead><tbody id="tableBody"></tbody></table></div>
</div>

<div id="vacancyTab" class="tab-content">
    <input type="date" id="vacancyDate" onchange="updateVacancy()" style="padding:10px; margin-bottom:15px;">
    <div id="captureArea">
        <div id="vacantRoomsGrid" style="display:grid; grid-template-columns: repeat(auto-fill, minmax(70px, 1fr)); gap: 10px;"></div>
    </div>
</div>

<div id="settingsTab" class="tab-content">
    <div class="form-group"><label>Room Config (Comma separated)</label><textarea id="roomNumbersInput"></textarea></div>
    <div class="form-group"><label>Backup Folder Path</label><input type="text" id="backupPathInput" placeholder="C:\Users\Hotel\Backups\"></div>
    <button onclick="saveSettings()" class="btn-tool" style="background:#2563eb; color:white; width:100%; padding:12px;">Save Settings</button>
</div>

<div id="modal" class="modal">
    <div class="modal-content">
        <h2 id="modalTitle">Booking Details</h2>
        <div class="form-group"><label>Room</label><input type="text" id="formRoom"></div>
        <div class="form-group"><label>Guest Name(s)</label><input type="text" id="formGuest"></div>
        <div style="display:flex; gap:10px;">
            <div class="form-group" style="flex:1;"><label>In Date</label><input type="date" id="formIn"></div>
            <div class="form-group" style="width:80px;"><label>Time</label><input type="time" id="formInTime" value="12:00"></div>
        </div>
        <div style="display:flex; gap:10px;">
            <div class="form-group" style="flex:1;"><label>Out Date</label><input type="date" id="formOut"></div>
            <div class="form-group" style="width:80px;"><label>Time</label><input type="time" id="formOutTime" value="11:00"></div>
        </div>
        <div class="form-group"><label>Comments</label><textarea id="formComments"></textarea></div>
        <button onclick="saveBooking()" style="width:100%; padding:12px; background:#2563eb; color:white; border:none; border-radius:6px; font-weight:bold;">Save</button>
        <button onclick="deleteBooking()" id="deleteBtn" style="width:100%; margin-top:8px; background:#ef4444; color:white; border:none; border-radius:6px; display:none;">Delete</button>
        <button onclick="closeModal()" style="width:100%; margin-top:8px; background:none; border:none; color:#666;">Cancel</button>
    </div>
</div>

<script>
    let bookings = JSON.parse(localStorage.getItem('hotelBookings')) || [];
    let config = JSON.parse(localStorage.getItem('hotelConfig')) || { rooms: ['101', '102', '103'], path: '' };
    let viewDate = new Date();
    viewDate.setDate(viewDate.getDate() - (viewDate.getDay() === 0 ? 6 : viewDate.getDay() - 1));
    let activeId = null;

    function switchTab(t) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-button').forEach(b => b.classList.remove('active'));
        document.getElementById(t + 'Tab').classList.add('active');
        document.getElementById('btn-' + t).classList.add('active');
        if(t === 'vacancy') updateVacancy();
    }

    function updateUI() {
        const days = [];
        for(let i=0; i<7; i++) { let d = new Date(viewDate); d.setDate(d.getDate() + i); days.push(d); }
        document.getElementById('weekLabel').textContent = days[0].toLocaleDateString(undefined, {weekday:'long', year:'numeric', month:'long', day:'numeric'});

        const header = document.getElementById('tableHeader');
        header.innerHTML = '<th>Room</th>' + days.map(d => `<th>${d.toLocaleDateString(undefined,{weekday:'short', day:'numeric'})}</th>`).join('');
        
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = config.rooms.map(room => {
            let row = `<td style="font-weight:bold; background:#f9fafb;" onclick="openWithRoom('${room}')">${room}</td>`;
            days.forEach(day => {
                const dStr = day.toISOString().split('T')[0];
                const matches = bookings.filter(b => b.room === room && dStr >= b.in && dStr <= b.out);
                
                let cellHtml = '';
                if(matches.length > 0) {
                    matches.forEach(m => {
                        let status = "occupied";
                        if(dStr === m.in) status = "check-in";
                        if(dStr === m.out) status = "check-out";
                        const isLate = status === "check-out" && m.outTime > "11:00";
                        cellHtml += `<div ondblclick="editBooking('${m.id}')" style="margin-bottom:4px;">
                            <div class="status-cell status-${status} ${isLate ? 'late-alert' : ''}">${status.toUpperCase()}</div>
                            <span style="font-size:9px; font-weight:bold;">${m.guest}</span>
                            <div class="tooltip"><b>${m.guest}</b><br>In: ${m.inTime} | Out: ${m.outTime}<br>Note: ${m.comments || '-'}</div>
                        </div>`;
                    });
                    row += `<td>${cellHtml}</td>`;
                } else { row += `<td ondblclick="openWithRoom('${room}', '${dStr}')">-</td>`; }
            });
            return `<tr>${row}</tr>`;
        }).join('');
    }

    function saveBooking() {
        const data = {
            id: activeId || Date.now(),
            room: document.getElementById('formRoom').value,
            guest: document.getElementById('formGuest').value,
            in: document.getElementById('formIn').value,
            inTime: document.getElementById('formInTime').value,
            out: document.getElementById('formOut').value,
            outTime: document.getElementById('formOutTime').value,
            comments: document.getElementById('formComments').value
        };
        
        if(activeId) {
            const idx = bookings.findIndex(b => b.id == activeId);
            bookings[idx] = data;
        } else { bookings.push(data); }
        
        localStorage.setItem('hotelBookings', JSON.stringify(bookings));
        closeModal(); updateUI();
    }

    function editBooking(id) {
        const b = bookings.find(item => item.id == id);
        activeId = id;
        document.getElementById('modalTitle').innerText = "Edit";
        document.getElementById('deleteBtn').style.display = 'block';
        document.getElementById('formRoom').value = b.room;
        document.getElementById('formGuest').value = b.guest;
        document.getElementById('formIn').value = b.in;
        document.getElementById('formInTime').value = b.inTime;
        document.getElementById('formOut').value = b.out;
        document.getElementById('formOutTime').value = b.outTime;
        document.getElementById('formComments').value = b.comments;
        document.getElementById('modal').classList.add('active');
    }

    function openWithRoom(r, d) { activeId = null; document.getElementById('deleteBtn').style.display = 'none'; document.getElementById('formRoom').value = r; if(d) document.getElementById('formIn').value = d; document.getElementById('modal').classList.add('active'); }
    function closeModal() { document.getElementById('modal').classList.remove('active'); }
    function changeWeek(o) { viewDate.setDate(viewDate.getDate() + o); updateUI(); }
    function deleteBooking() { bookings = bookings.filter(b => b.id != activeId); localStorage.setItem('hotelBookings', JSON.stringify(bookings)); closeModal(); updateUI(); }
    function saveSettings() { config.rooms = document.getElementById('roomNumbersInput').value.split(',').map(s => s.trim()); config.path = document.getElementById('backupPathInput').value; localStorage.setItem('hotelConfig', JSON.stringify(config)); updateUI(); alert("Saved"); }
    function updateVacancy() { const v = document.getElementById('vacancyDate').value || new Date().toISOString().split('T')[0]; document.getElementById('vacantRoomsGrid').innerHTML = config.rooms.map(r => `<div style="padding:10px; border:2px solid ${bookings.some(b => b.room === r && v >= b.in && v <= b.out) ? 'red' : 'green'}">${r}</div>`).join(''); }
    function exportData() { let d = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify({bookings, config})); let a = document.createElement('a'); a.href = d; a.download = 'hotel_backup.xls'; a.click(); }
    function importData(e) { let r = new FileReader(); r.onload = (ev) => { let d = JSON.parse(ev.target.result); bookings = d.bookings; config = d.config; localStorage.setItem('hotelBookings', JSON.stringify(bookings)); localStorage.setItem('hotelConfig', JSON.stringify(config)); updateUI(); }; r.readAsText(e.target.files[0]); }

    document.getElementById('roomNumbersInput').value = config.rooms.join(', ');
    document.getElementById('backupPathInput').value = config.path || '';
    updateUI();
</script>
</body>
</html>
