<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Room Tracker</title>
    <style>
        /* - Styling for layout and colors */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: #f3f4f6; padding-bottom: 80px; }
        .header { background: linear-gradient(135deg, #2563eb 0%, #1e40af 100%); color: white; padding: 16px; }
        .week-nav { display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.2); padding: 8px; border-radius: 8px; margin-top: 10px; }
        .tabs { display: flex; background: white; border-bottom: 2px solid #e5e7eb; position: sticky; top: 0; z-index: 50; }
        .tab-button { flex: 1; padding: 16px; border: none; background: none; cursor: pointer; font-weight: 600; color: #6b7280; }
        .tab-button.active { color: #2563eb; border-bottom: 3px solid #2563eb; }
        .tab-content { display: none; padding: 15px; }
        .tab-content.active { display: block; }
        .table-container { overflow-x: auto; background: white; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #e5e7eb; padding: 8px; text-align: center; min-width: 100px; }
        th { background: #1e40af; color: white; }
        .status-cell { border-radius: 4px; padding: 4px; font-size: 10px; font-weight: bold; margin-bottom: 3px; }
        .status-check-in { background: #10b981; color: white; }
        .status-check-out { background: #f59e0b; color: white; }
        .status-occupied { background: #3b82f6; color: white; }
        .guest-info { font-size: 11px; font-weight: bold; }
        .company-info { font-size: 10px; font-style: italic; color: #666; display: block; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 1000; }
        .modal.active { display: flex; }
        .modal-content { background: white; padding: 20px; border-radius: 8px; width: 90%; max-width: 400px; }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; margin-bottom: 5px; font-size: 14px; }
        .form-group input { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        .add-btn { position: fixed; bottom: 20px; right: 20px; width: 60px; height: 60px; border-radius: 50%; background: #2563eb; color: white; border: none; font-size: 30px; cursor: pointer; }
        .room-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(60px, 1fr)); gap: 10px; }
        .room-badge { padding: 15px; border: 2px solid #10b981; border-radius: 8px; text-align: center; font-weight: bold; }
        .room-badge.occupied { border-color: #ef4444; color: #ef4444; opacity: 0.5; }
    </style>
</head>
<body>

    <div class="header">
        <h1>🏨 Hotel Tracker</h1>
        <div class="week-nav">
            <button onclick="changeWeek(-7)">◀</button>
            <span id="weekLabel"></span>
            <button onclick="changeWeek(7)">▶</button>
        </div>
    </div>

    <div class="tabs">
        <button class="tab-button active" onclick="switchTab('tracker')">📅 Tracker</button>
        <button class="tab-button" onclick="switchTab('vacancy')">🔍 Vacancy</button>
        <button class="tab-button" onclick="switchTab('settings')">⚙️ Settings</button>
    </div>

    <div id="trackerTab" class="tab-content active">
        <div class="table-container">
            <table>
                <thead><tr id="tableHeader"></tr></thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
        <div id="bookingsList" style="margin-top: 20px;"></div>
    </div>

    <div id="vacancyTab" class="tab-content">
        <input type="date" id="vacancyDate" onchange="updateVacancy()" style="margin-bottom: 20px; padding: 8px;">
        <div class="room-grid" id="vacantRoomsGrid"></div>
    </div>

    <div id="settingsTab" class="tab-content">
        <div class="form-group">
            <label>Room List (Comma separated)</label>
            <textarea id="roomNumbersInput" style="width: 100%; height: 100px; padding: 8px;"></textarea>
        </div>
        <button onclick="saveSettings()" style="padding: 10px 20px; background: #2563eb; color: white; border: none; border-radius: 4px;">Save Settings</button>
    </div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <h2 id="modalTitle">Add Booking</h2>
            <div class="form-group"><label>Room</label><input type="text" id="roomNum"></div>
            <div class="form-group"><label>Guest</label><input type="text" id="guestName"></div>
            <div class="form-group"><label>Company</label><input type="text" id="companyName"></div>
            <div class="form-group"><label>Check-in</label><input type="date" id="checkIn"></div>
            <div class="form-group"><label>Check-out</label><input type="date" id="checkOut"></div>
            <button onclick="saveBooking()" style="width: 100%; padding: 10px; background: #2563eb; color: white; border: none; border-radius: 4px;">Save</button>
            <button onclick="closeModal()" style="width: 100%; margin-top: 10px; background: none; border: none; color: #666;">Cancel</button>
        </div>
    </div>

    <button class="add-btn" onclick="openModal()">+</button>

    <script>
        /* - Core logic and data handling */
        let rooms = JSON.parse(localStorage.getItem('hotelRooms')) || [];
        let settings = JSON.parse(localStorage.getItem('hotelSettings')) || { roomNumbers: ['101', '102'] };
        let currentWeekStart = new Date();
        currentWeekStart.setDate(currentWeekStart.getDate() - currentWeekStart.getDay() + 1); // Set to Monday

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab-button').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId + 'Tab').classList.add('active');
            event.target.classList.add('active');
            if(tabId === 'vacancy') updateVacancy();
        }

        function updateUI() {
            // - Updates table and labels
            const days = [];
            for(let i=0; i<7; i++) {
                let d = new Date(currentWeekStart);
                d.setDate(d.getDate() + i);
                days.push(d);
            }
            document.getElementById('weekLabel').textContent = "Week of " + days[0].toLocaleDateString();

            const header = document.getElementById('tableHeader');
            header.innerHTML = '<th>Room</th>' + days.map(d => `<th>${d.toLocaleDateString(undefined, {weekday:'short', day:'numeric'})}</th>`).join('');

            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = settings.roomNumbers.map(room => {
                let row = `<td><b>${room}</b></td>`;
                days.forEach(day => {
                    const booking = rooms.find(b => b.room === room && day >= new Date(b.in) && day <= new Date(b.out));
                    if(booking) {
                        let status = "occupied";
                        if(day.toDateString() === new Date(booking.in).toDateString()) status = "check-in";
                        if(day.toDateString() === new Date(booking.out).toDateString()) status = "check-out";
                        row += `<td><div class="status-cell status-${status}">${status.toUpperCase()}</div>
                                <span class="guest-info">${booking.guest}</span>
                                <span class="company-info">${booking.company || ''}</span></td>`;
                    } else {
                        row += `<td>-</td>`;
                    }
                });
                return `<tr>${row}</tr>`;
            }).join('');
        }

        function openModal() { document.getElementById('modal').classList.add('active'); }
        function closeModal() { document.getElementById('modal').classList.remove('active'); }

        function saveBooking() {
            rooms.push({
                room: document.getElementById('roomNum').value,
                guest: document.getElementById('guestName').value,
                company: document.getElementById('companyName').value,
                in: document.getElementById('checkIn').value,
                out: document.getElementById('checkOut').value
            });
            localStorage.setItem('hotelRooms', JSON.stringify(rooms));
            closeModal();
            updateUI();
        }

        function saveSettings() {
            settings.roomNumbers = document.getElementById('roomNumbersInput').value.split(',').map(s => s.trim());
            localStorage.setItem('hotelSettings', JSON.stringify(settings));
            alert("Settings Saved");
            updateUI();
        }

        function updateVacancy() {
            const dateVal = document.getElementById('vacancyDate').value || new Date().toISOString().split('T')[0];
            const checkDate = new Date(dateVal);
            const grid = document.getElementById('vacantRoomsGrid');
            grid.innerHTML = settings.roomNumbers.map(room => {
                const isOccupied = rooms.some(b => b.room === room && checkDate >= new Date(b.in) && checkDate <= new Date(b.out));
                return `<div class="room-badge ${isOccupied ? 'occupied' : ''}">${room}</div>`;
            }).join('');
        }

        function changeWeek(days) {
            currentWeekStart.setDate(currentWeekStart.getDate() + days);
            updateUI();
        }

        document.getElementById('roomNumbersInput').value = settings.roomNumbers.join(', ');
        updateUI();
    </script>
</body>
</html>
